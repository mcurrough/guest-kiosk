<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Check-In Kiosk</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* Prevents text selection on touchscreens */
        }

        .kiosk-container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            font-size: 1.25rem;
            border: 2px solid #cbd5e1;
            border-radius: 0.75rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 1.25rem;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
            background-color: #1d4ed8;
        }

        #confirmation {
            display: none;
            margin-top: 1rem;
            font-size: 1.2rem;
            color: #059669;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="kiosk-container">
        <h1>Welcome</h1>
        
        <div id="checkin-form">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your name" autocomplete="off">
            </div>
            
            <button id="submitBtn">Check In</button>
        </div>

        <div id="confirmation">
            Checking you in...
        </div>
    </div>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const fullNameInput = document.getElementById('fullName');
        const formDiv = document.getElementById('checkin-form');
        const confirmationDiv = document.getElementById('confirmation');

        submitBtn.addEventListener('click', () => {
            const name = fullNameInput.value.trim();

            if (name === "") {
                alert("Please enter your name.");
                return;
            }

            // Simulate a submission process
            formDiv.style.display = 'none';
            confirmationDiv.style.display = 'block';
            confirmationDiv.innerHTML = `<h2>Thank you, ${name}!</h2><p>You are now checked in.</p>`;

            // Reset the kiosk after 5 seconds for the next guest
            setTimeout(() => {
                fullNameInput.value = "";
                formDiv.style.display = 'block';
                confirmationDiv.style.display = 'none';
            }, 5000);
        });
    </script>

</body>
</html>
