<script>
    const submitBtn = document.getElementById('submitBtn');
    const fullNameInput = document.getElementById('fullName');
    const formDiv = document.getElementById('checkin-form');
    const confirmationDiv = document.getElementById('confirmation');

    submitBtn.addEventListener('click', () => {
        const name = fullNameInput.value.trim();

        if (name === "") {
            alert("Please enter your name.");
            return;
        }

        // 1. Show the "Checking you in" message
        formDiv.style.display = 'none';
        confirmationDiv.style.display = 'block';
        confirmationDiv.innerHTML = `<h2>Thank you, ${name}.</h2><p>Loading your portal...</p>`;

        // 2. Wait 2 seconds, then navigate to your Instructure site
        setTimeout(() => {
            window.location.href = "http://worsham.instructure.com/";
        }, 2000);
    });

    // Disable right-click to keep it feeling like a "locked" app
    document.addEventListener('contextmenu', event => event.preventDefault());
</script>
